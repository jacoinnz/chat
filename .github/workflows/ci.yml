name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          TURSO_DATABASE_URL: "file:./ci-test.db"
          TURSO_AUTH_TOKEN: "ci-dummy-token"
          NEXT_PUBLIC_AZURE_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          ANTHROPIC_API_KEY: "sk-ant-ci-dummy"

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
